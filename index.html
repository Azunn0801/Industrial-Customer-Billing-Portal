<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial Customer Billing Portal | Aura Grid</title>
  <meta name="description" content="Enterprise B2B industrial billing management portal for industrial energy customers." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            spin: { '100%': { transform: 'rotate(360deg)' } }
          },
          animation: {
            fadeIn: 'fadeIn 0.3s ease-out forwards',
            scaleIn: 'scaleIn 0.25s ease-out forwards',
            spin: 'spin 0.8s linear infinite'
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .scale-in { animation: scaleIn 0.25s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    .modal-backdrop { backdrop-filter: blur(4px); }
    input:focus { outline: none; }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── ICONS (inline SVG) ─────────────────────────────────────────────────
    const ShieldIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6">
        <path fillRule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clipRule="evenodd" />
      </svg>
    );
    const UserIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
        <path fillRule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clipRule="evenodd" />
      </svg>
    );
    const LockIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
        <path fillRule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clipRule="evenodd" />
      </svg>
    );
    const CheckCircleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-16 h-16">
        <path fillRule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clipRule="evenodd" />
      </svg>
    );
    const PlusIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
        <path fillRule="evenodd" d="M12 3.75a.75.75 0 01.75.75v6.75h6.75a.75.75 0 010 1.5h-6.75v6.75a.75.75 0 01-1.5 0v-6.75H4.5a.75.75 0 010-1.5h6.75V4.5a.75.75 0 01.75-.75z" clipRule="evenodd" />
      </svg>
    );
    const BoltIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
        <path fillRule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.302H3.75a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.143z" clipRule="evenodd" />
      </svg>
    );
    const CloseIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
        <path fillRule="evenodd" d="M5.47 5.47a.75.75 0 011.06 0L12 10.94l5.47-5.47a.75.75 0 111.06 1.06L13.06 12l5.47 5.47a.75.75 0 11-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 01-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 010-1.06z" clipRule="evenodd" />
      </svg>
    );

    // ─── SCREEN 1: LOGIN ─────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!username.trim() || !password.trim()) {
          setError('Please enter your username and password.');
          return;
        }
        setError('');
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          onLogin({ username });
        }, 800);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center px-4">
          {/* Background grid */}
          <div className="absolute inset-0 opacity-10"
            style={{ backgroundImage: 'linear-gradient(rgba(59,130,246,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.3) 1px, transparent 1px)', backgroundSize: '60px 60px' }}>
          </div>

          <div className="relative w-full max-w-md fade-in">
            {/* Brand Header */}
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-2xl shadow-blue-600/40 mb-4">
                <BoltIcon />
              </div>
              <h1 className="text-3xl font-bold text-white tracking-tight">Aura Grid</h1>
              <p className="text-blue-300 mt-1 text-sm font-medium tracking-widest uppercase">Industrial Customer Portal</p>
            </div>

            {/* Login Card */}
            <div className="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
              <div className="bg-slate-800 px-6 py-4 border-b border-slate-700">
                <h2 className="text-white font-semibold text-sm tracking-wide uppercase">Customer Login</h2>
                <p className="text-slate-400 text-xs mt-0.5">Authorized access only. All activity is monitored.</p>
              </div>

              <form onSubmit={handleSubmit} className="p-6 space-y-5">
                {/* Username Field */}
                <div>
                  <label htmlFor="username" className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                    Username
                  </label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                      <UserIcon />
                    </div>
                    <input
                      id="username"
                      name="username"
                      type="text"
                      autoComplete="username"
                      value={username}
                      onChange={e => setUsername(e.target.value)}
                      placeholder="Enter your username"
                      className="w-full pl-9 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-700 placeholder-slate-400 bg-slate-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                    />
                  </div>
                </div>

                {/* Password Field */}
                <div>
                  <label htmlFor="password" className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                    Password
                  </label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                      <LockIcon />
                    </div>
                    <input
                      id="password"
                      name="password"
                      type="password"
                      autoComplete="current-password"
                      value={password}
                      onChange={e => setPassword(e.target.value)}
                      placeholder="Enter your password"
                      className="w-full pl-9 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-700 placeholder-slate-400 bg-slate-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                    />
                  </div>
                </div>

                {/* Error message */}
                {error && (
                  <div className="flex items-center gap-2 p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-700">
                    <span>⚠</span> {error}
                  </div>
                )}

                {/* LOGIN Submit Button */}
                <button
                  id="login-button"
                  type="submit"
                  disabled={loading}
                  className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-blue-600/25 text-sm tracking-wide"
                >
                  {loading ? (
                    <>
                      <svg className="spinner w-4 h-4" viewBox="0 0 24 24" fill="none">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                      </svg>
                      Authenticating...
                    </>
                  ) : (
                    'Login'
                  )}
                </button>
              </form>

              <div className="px-6 pb-4 text-center">
                <p className="text-xs text-slate-400">
                  🔒 256-bit SSL encrypted connection. Portal access subject to terms of service.
                </p>
              </div>
            </div>

            <p className="text-center text-slate-500 text-xs mt-4">
              © 2026 Aura Grid Energy Management Inc. All rights reserved.
            </p>
          </div>
        </div>
      );
    }

    // ─── SCREEN 2: DASHBOARD ─────────────────────────────────────────────────
    function DashboardScreen({ user, onOpenPayment, onLogout }) {
      const invoices = [
        { id: 'INV-2026-001', period: 'June 2026', consumption: '42,800 kWh', solar: '-15,600 kWh', amount: '$8,950.00', status: 'Overdue', dueDate: '30 Jun 2026' },
        { id: 'INV-2026-002', period: 'May 2026', consumption: '41,200 kWh', solar: '-14,200 kWh', amount: '$8,780.00', status: 'Paid', dueDate: '31 May 2026' },
        { id: 'INV-2026-003', period: 'April 2026', consumption: '39,500 kWh', solar: '-13,100 kWh', amount: '$8,312.00', status: 'Paid', dueDate: '30 Apr 2026' },
      ];

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col">
          {/* Top Navigation Bar */}
          <header className="bg-slate-900 border-b border-slate-700 sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
              <div className="flex items-center gap-3">
                <div className="flex items-center justify-center w-8 h-8 bg-blue-600 rounded-lg">
                  <BoltIcon />
                </div>
                <div>
                  <span className="font-bold text-white text-sm">Aura Grid</span>
                  <span className="text-slate-400 text-xs ml-2 hidden sm:inline">Industrial Customer Portal</span>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-lg border border-slate-700">
                  <div className="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">
                    {user.username[0].toUpperCase()}
                  </div>
                  <span className="text-slate-300 text-xs font-medium hidden sm:inline">{user.username}</span>
                </div>
                <button
                  onClick={onLogout}
                  className="px-3 py-1.5 text-xs font-medium text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors border border-transparent hover:border-slate-600"
                >
                  Sign Out
                </button>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6 space-y-6">
            {/* Page Title */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div>
                <h2 className="text-xl font-bold text-slate-800">Billing Dashboard</h2>
                <p className="text-sm text-slate-500 mt-0.5">Titan Steel Corp — Meter ID: TS-GRID-MET-09A</p>
              </div>
              {/* ===== PAY BILL BUTTON (testRigor Target) ===== */}
              <button
                id="pay-bill-button"
                onClick={onOpenPayment}
                className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg shadow-lg shadow-blue-600/30 transition-all hover:scale-105 active:scale-95 text-sm border-2 border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
              >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
                  <path d="M12 7.5a2.25 2.25 0 100 4.5 2.25 2.25 0 000-4.5z" />
                  <path fillRule="evenodd" d="M1.5 4.875C1.5 3.839 2.34 3 3.375 3h17.25c1.035 0 1.875.84 1.875 1.875v9.75c0 1.036-.84 1.875-1.875 1.875H3.375A1.875 1.875 0 011.5 14.625v-9.75zM8.25 9.75a3.75 3.75 0 117.5 0 3.75 3.75 0 01-7.5 0zM18.75 9a.75.75 0 00-.75.75v.008c0 .414.336.75.75.75h.008a.75.75 0 00.75-.75V9.75a.75.75 0 00-.75-.75h-.008zM4.5 9.75A.75.75 0 015.25 9h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75H5.25a.75.75 0 01-.75-.75V9.75z" clipRule="evenodd" />
                  <path d="M2.25 18a.75.75 0 000 1.5c5.4 0 10.63.722 15.6 2.075 1.19.324 2.4-.558 2.4-1.82V18.75a.75.75 0 00-.75-.75H2.25z" />
                </svg>
                Pay Bill
              </button>
            </div>

            {/* Summary Stats Cards */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { label: 'Current Balance Due', value: '$8,950.00', sub: 'Overdue — INV-2026-001', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200' },
                { label: 'Grid Consumption (Jun)', value: '42,800 kWh', sub: 'Peak + Off-peak combined', color: 'text-slate-700', bg: 'bg-white', border: 'border-slate-200' },
                { label: 'Solar Net Metering', value: '15,600 kWh', sub: 'Credit: $3,120.00', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200' },
                { label: 'Tariff Rate', value: '$0.282/kWh', sub: 'Industrial Medium Voltage', color: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-200' },
              ].map((card, i) => (
                <div key={i} className={`${card.bg} border ${card.border} rounded-xl p-4 shadow-sm`}>
                  <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{card.label}</p>
                  <p className={`text-2xl font-bold ${card.color} mt-1`}>{card.value}</p>
                  <p className="text-xs text-slate-500 mt-1">{card.sub}</p>
                </div>
              ))}
            </div>

            {/* Invoice Table */}
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <h3 className="font-semibold text-slate-700 text-sm">Invoice History</h3>
                <span className="text-xs text-slate-400 font-medium">FY 2026</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-100 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                      <th className="text-left px-5 py-3">Invoice ID</th>
                      <th className="text-left px-5 py-3">Billing Period</th>
                      <th className="text-right px-5 py-3">Consumption</th>
                      <th className="text-right px-5 py-3">Solar Credit</th>
                      <th className="text-right px-5 py-3">Amount</th>
                      <th className="text-center px-5 py-3">Status</th>
                      <th className="text-right px-5 py-3">Due Date</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50">
                    {invoices.map((inv, i) => (
                      <tr key={i} className="hover:bg-slate-50 transition-colors">
                        <td className="px-5 py-3.5 font-mono text-xs font-semibold text-blue-700">{inv.id}</td>
                        <td className="px-5 py-3.5 text-slate-700 font-medium">{inv.period}</td>
                        <td className="px-5 py-3.5 text-right text-slate-600">{inv.consumption}</td>
                        <td className="px-5 py-3.5 text-right text-emerald-600 font-medium">{inv.solar}</td>
                        <td className="px-5 py-3.5 text-right font-bold text-slate-800">{inv.amount}</td>
                        <td className="px-5 py-3.5 text-center">
                          <span className={`inline-flex px-2.5 py-0.5 rounded-full text-xs font-bold ${
                            inv.status === 'Overdue'
                              ? 'bg-red-100 text-red-700 border border-red-200'
                              : 'bg-emerald-100 text-emerald-700 border border-emerald-200'
                          }`}>
                            {inv.status}
                          </span>
                        </td>
                        <td className="px-5 py-3.5 text-right text-slate-500 text-xs">{inv.dueDate}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="bg-slate-900 border-t border-slate-700 py-3 text-center text-xs text-slate-500 mt-auto">
            Aura Grid Industrial Portal v2.6 · Secure Connection · © 2026 Aura Grid Energy Management Inc.
          </footer>
        </div>
      );
    }

    // ─── SCREEN 3: PAYMENT MODAL ─────────────────────────────────────────────
    function PaymentModal({ onClose, onSuccess }) {
      const [companyName, setCompanyName] = useState('');
      const [account, setAccount] = useState('');
      const [value, setValue] = useState('');
      const [paymentMethods, setPaymentMethods] = useState([
        { id: 1, type: 'Visa', last4: '4844', expiry: '09/27', isDefault: true }
      ]);
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});

      const handleAdd = () => {
        const newMethod = {
          id: Date.now(),
          type: 'Mastercard',
          last4: Math.floor(1000 + Math.random() * 9000).toString(),
          expiry: '12/28',
          isDefault: false
        };
        setPaymentMethods(prev => [...prev, newMethod]);
      };

      const validate = () => {
        const errs = {};
        if (!companyName.trim()) errs.companyName = 'Company Name is required';
        if (!account.trim()) errs.account = 'Account is required';
        if (!value.trim() || isNaN(parseFloat(value))) errs.value = 'A valid value is required';
        return errs;
      };

      const handlePay = (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length > 0) {
          setErrors(errs);
          return;
        }
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          onSuccess({ companyName, account, value });
        }, 1000);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-slate-950/70">
          <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 scale-in overflow-hidden">
            {/* Modal Header */}
            <div className="flex items-center justify-between px-6 py-4 bg-slate-800 border-b border-slate-700">
              <div>
                <h3 className="text-white font-bold text-base">Bill Payment</h3>
                <p className="text-slate-400 text-xs mt-0.5">Aura Grid — Secure Transaction</p>
              </div>
              <button
                onClick={onClose}
                className="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"
              >
                <CloseIcon />
              </button>
            </div>

            <form onSubmit={handlePay} className="p-6 space-y-5">
              {/* Company Name */}
              <div>
                <label htmlFor="company-name" className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                  Company Name
                </label>
                <input
                  id="company-name"
                  name="companyName"
                  type="text"
                  value={companyName}
                  onChange={e => { setCompanyName(e.target.value); setErrors(v => ({ ...v, companyName: '' })); }}
                  placeholder="Company Name"
                  className={`w-full px-3.5 py-2.5 border rounded-lg text-sm text-slate-700 placeholder-slate-400 bg-slate-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all ${errors.companyName ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
                />
                {errors.companyName && <p className="text-xs text-red-600 mt-1">{errors.companyName}</p>}
              </div>

              {/* Account */}
              <div>
                <label htmlFor="account" className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                  Account
                </label>
                <input
                  id="account"
                  name="account"
                  type="text"
                  value={account}
                  onChange={e => { setAccount(e.target.value); setErrors(v => ({ ...v, account: '' })); }}
                  placeholder="Account"
                  className={`w-full px-3.5 py-2.5 border rounded-lg text-sm text-slate-700 placeholder-slate-400 bg-slate-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all ${errors.account ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
                />
                {errors.account && <p className="text-xs text-red-600 mt-1">{errors.account}</p>}
              </div>

              {/* Value */}
              <div>
                <label htmlFor="value" className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                  Value
                </label>
                <div className="relative">
                  <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 text-sm font-semibold">$</span>
                  <input
                    id="value"
                    name="value"
                    type="number"
                    step="0.01"
                    min="0"
                    value={value}
                    onChange={e => { setValue(e.target.value); setErrors(v => ({ ...v, value: '' })); }}
                    placeholder="Value"
                    className={`w-full pl-8 pr-3.5 py-2.5 border rounded-lg text-sm text-slate-700 placeholder-slate-400 bg-slate-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all ${errors.value ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}
                  />
                </div>
                {errors.value && <p className="text-xs text-red-600 mt-1">{errors.value}</p>}
              </div>

              {/* Payment Methods Section */}
              <div className="pt-1">
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">
                    Payment Methods
                  </label>
                  {/* ===== ADD BUTTON (testRigor Target) ===== */}
                  <button
                    id="add-payment-button"
                    type="button"
                    onClick={handleAdd}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-lg transition-colors shadow-sm shadow-blue-600/20"
                  >
                    <PlusIcon />
                    ADD
                  </button>
                </div>

                {/* Payment Method Cards */}
                <div className="space-y-2 max-h-[120px] overflow-y-auto pr-1">
                  {paymentMethods.map(method => (
                    <div key={method.id} className={`flex items-center justify-between p-3 rounded-lg border text-xs ${method.isDefault ? 'border-blue-300 bg-blue-50' : 'border-slate-200 bg-slate-50'}`}>
                      <div className="flex items-center gap-2">
                        <div className={`w-8 h-5 rounded text-[9px] font-black flex items-center justify-center ${method.type === 'Visa' ? 'bg-blue-700 text-white' : 'bg-red-600 text-white'}`}>
                          {method.type === 'Visa' ? 'VISA' : 'MC'}
                        </div>
                        <span className="font-semibold text-slate-700">•••• {method.last4}</span>
                        <span className="text-slate-400">Exp {method.expiry}</span>
                      </div>
                      {method.isDefault && (
                        <span className="bg-blue-100 text-blue-700 text-[9px] font-bold uppercase px-1.5 py-0.5 rounded border border-blue-200">Default</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {/* Divider */}
              <div className="border-t border-slate-100 pt-1" />

              {/* Action Buttons */}
              <div className="flex gap-3">
                <button
                  type="button"
                  onClick={onClose}
                  className="flex-1 px-4 py-2.5 border border-slate-300 text-slate-600 font-semibold text-sm rounded-lg hover:bg-slate-50 transition-colors"
                >
                  Cancel
                </button>
                {/* ===== PAY BUTTON (testRigor Target) ===== */}
                <button
                  id="pay-button"
                  type="submit"
                  disabled={loading}
                  className="flex-1 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-bold text-sm py-2.5 rounded-lg transition-colors shadow-lg shadow-blue-600/25"
                >
                  {loading ? (
                    <>
                      <svg className="spinner w-4 h-4" viewBox="0 0 24 24" fill="none">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                      </svg>
                      Processing...
                    </>
                  ) : (
                    'Pay'
                  )}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─── SCREEN 4: SUCCESS ───────────────────────────────────────────────────
    function SuccessScreen({ paymentInfo, onDone }) {
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center px-4">
          <div className="w-full max-w-md text-center fade-in">
            {/* Success Icon */}
            <div className="flex justify-center mb-6">
              <div className="text-emerald-400 drop-shadow-2xl">
                <CheckCircleIcon />
              </div>
            </div>

            {/* SUCCESS MESSAGE — exact text for testRigor */}
            <h2 className="text-4xl font-extrabold text-white mb-2 tracking-tight">
              Payment Complete
            </h2>
            <p className="text-blue-300 text-base font-medium mb-8">
              Your transaction has been processed successfully.
            </p>

            {/* Transaction Details Card */}
            <div className="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-6 text-left mb-6">
              <h3 className="text-white/60 text-xs font-bold uppercase tracking-widest mb-3">Transaction Summary</h3>
              <div className="space-y-2.5 text-sm">
                <div className="flex justify-between">
                  <span className="text-white/60">Company Name</span>
                  <span className="text-white font-semibold">{paymentInfo.companyName}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-white/60">Account</span>
                  <span className="text-white font-semibold font-mono">{paymentInfo.account}</span>
                </div>
                <div className="flex justify-between border-t border-white/10 pt-2 mt-2">
                  <span className="text-white/60">Amount Paid</span>
                  <span className="text-emerald-400 font-extrabold text-base">${parseFloat(paymentInfo.value || 0).toFixed(2)}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-white/60">Reference No.</span>
                  <span className="text-white font-mono text-xs">TXN-{Math.random().toString(36).substr(2, 9).toUpperCase()}</span>
                </div>
              </div>
            </div>

            <button
              id="done-button"
              onClick={onDone}
              className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-xl shadow-blue-600/30 text-sm"
            >
              Return to Dashboard
            </button>

            <p className="text-white/30 text-xs mt-4">
              A confirmation receipt has been sent to your registered email address.
            </p>
          </div>
        </div>
      );
    }

    // ─── ROOT APP ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('login');   // login | dashboard | success
      const [user, setUser] = useState(null);
      const [showPayment, setShowPayment] = useState(false);
      const [paymentInfo, setPaymentInfo] = useState(null);

      const handleLogin = (userData) => {
        setUser(userData);
        setScreen('dashboard');
      };

      const handleLogout = () => {
        setUser(null);
        setScreen('login');
      };

      const handlePaymentSuccess = (info) => {
        setPaymentInfo(info);
        setShowPayment(false);
        setScreen('success');
      };

      const handleDone = () => {
        setScreen('dashboard');
        setPaymentInfo(null);
      };

      return (
        <>
          {screen === 'login' && (
            <LoginScreen onLogin={handleLogin} />
          )}

          {screen === 'dashboard' && (
            <>
              <DashboardScreen
                user={user}
                onOpenPayment={() => setShowPayment(true)}
                onLogout={handleLogout}
              />
              {showPayment && (
                <PaymentModal
                  onClose={() => setShowPayment(false)}
                  onSuccess={handlePaymentSuccess}
                />
              )}
            </>
          )}

          {screen === 'success' && (
            <SuccessScreen
              paymentInfo={paymentInfo}
              onDone={handleDone}
            />
          )}
        </>
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
